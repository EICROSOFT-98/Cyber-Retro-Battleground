<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EICR: Cyber Retro Battleground</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background: #03030c;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #fff;
        }
        
        /* Start & Logo Screen */
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }
        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }
        /* Custom Pixel-Style EICR Glitch Logo from Image */
        .main-logo {
            font-size: 75px;
            font-weight: 900;
            color: #228b22;
            letter-spacing: 5px;
            text-shadow: 3px 3px 0px #000, -3px -3px 0px #1a5c1a, 4px 4px 0px rgba(34,139,34,0.4);
            position: relative;
            line-height: 1;
        }
        .sub-logo {
            font-size: 11px;
            color: #228b22;
            letter-spacing: 3px;
            margin-top: 10px;
            word-spacing: 5px;
        }
        
        /* Color Selector */
        .color-picker-title {
            font-size: 14px;
            color: #00f0ff;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .color-options {
            display: flex;
            gap: 15px;
            margin-bottom: 35px;
        }
        .color-box {
            width: 45px;
            height: 45px;
            border: 3px solid #333;
            cursor: pointer;
            border-radius: 6px;
            transition: transform 0.2s, border-color 0.2s;
        }
        .color-box.selected {
            border-color: #ffffff;
            transform: scale(1.15);
            box-shadow: 0 0 15px currentColor;
        }

        /* Play Button */
        .play-btn {
            padding: 12px 45px;
            font-size: 22px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            background: #111;
            color: #228b22;
            border: 2px solid #228b22;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(34,139,34,0.3);
            text-transform: uppercase;
        }
        .play-btn:hover {
            background: #228b22;
            color: #000;
            box-shadow: 0 0 25px #228b22;
        }

        /* In-Game Cyber Top UI */
        #top-ui {
            width: 100%;
            max-width: 700px;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5, 5, 15, 0.95);
            border-radius: 6px;
            margin-bottom: 6px;
            border: 2px solid #00f0ff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.15);
        }
        .ui-section {
            display: flex;
            flex-direction: column;
        }
        .ui-label {
            font-size: 10px;
            font-weight: bold;
            color: #888;
            margin-bottom: 2px;
            letter-spacing: 1px;
        }
        .bar-container {
            width: 140px;
            height: 12px;
            background: #111;
            border: 1px solid #333;
            overflow: hidden;
        }
        #player-hp-bar { width: 100%; height: 100%; background: #00ff66; transition: width 0.1s; }
        #super-bar { width: 0%; height: 100%; background: #ff00ff; transition: width 0.2s; }
        
        #gameCanvas {
            background: #000;
            border: 2px solid #00f0ff;
            max-width: 100%;
            max-height: 48vh;
            display: block;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.1);
        }

        /* Mobile Controls Layout */
        #controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 700px;
            padding: 10px;
            margin-top: 4px;
        }
        .btn-group { display: flex; gap: 10px; align-items: center; }
        .btn {
            width: 62px;
            height: 62px;
            background: #090919;
            color: #00f0ff;
            border: 2px solid #00f0ff;
            border-radius: 12px;
            font-size: 22px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 8px rgba(0, 240, 255, 0.2);
        }
        .btn:active {
            background: #00f0ff;
            color: #000;
            box-shadow: 0 0 15px #00f0ff;
        }
        
        /* Teleport Skill Button */
        #teleportBtn {
            color: #ffcc00;
            border-color: #ffcc00;
            font-size: 12px;
            font-family: 'Courier New', Courier, monospace;
            position: relative;
            box-shadow: 0 0 8px rgba(255, 204, 0, 0.2);
        }
        #teleportBtn:active:not(.disabled) {
            background: #ffcc00;
            color: #000;
            box-shadow: 0 0 20px #ffcc00;
        }
        #teleportBtn.disabled {
            opacity: 0.4;
            color: #555;
            border-color: #333;
            background: #050505;
            box-shadow: none;
        }
        .cooldown-overlay {
            position: absolute;
            font-size: 14px;
            color: #ff0055;
            font-weight: bold;
        }

        #attackBtn { color: #ff0055; border-color: #ff0055; box-shadow: 0 0 8px rgba(255, 0, 85, 0.2); }
        #attackBtn:active { background: #ff0055; color: #000; box-shadow: 0 0 15px #ff0055; }
        #dashBtn { color: #ff00ff; border-color: #ff00ff; font-size: 12px; box-shadow: 0 0 8px rgba(255, 0, 255, 0.2); }
        #dashBtn:active { background: #ff00ff; color: #000; box-shadow: 0 0 15px #ff00ff; }
    </style>
</head>
<body>

    <!-- Start & Color Select Screen -->
    <div id="start-screen">
        <div class="logo-container">
            <div class="main-logo">EICR</div>
            <div class="sub-logo">--- EICROSOFT ™ TECHNOLOGY ---</div>
        </div>
        
        <div class="color-picker-title">CHOOSE YOUR CYBORG COLOR:</div>
        <div class="color-options">
            <div class="color-box selected" data-color="#00f0ff" data-shadow="#00f0ff" style="background: #00f0ff; color: #00f0ff;"></div>
            <div class="color-box" data-color="#00ff66" data-shadow="#00ff66" style="background: #00ff66; color: #00ff66;"></div>
            <div class="color-box" data-color="#ffff00" data-shadow="#ffff00" style="background: #ffff00; color: #ffff00;"></div>
            <div class="color-box" data-color="#ff00ff" data-shadow="#ff00ff" style="background: #ff00ff; color: #ff00ff;"></div>
        </div>

        <button class="play-btn" id="playBtn">PLAY</button>
    </div>

    <!-- Gameplay Top UI -->
    <div id="top-ui">
        <div class="ui-section">
            <span class="ui-label">CYBORG HP</span>
            <div class="bar-container"><div id="player-hp-bar"></div></div>
        </div>
        <div style="text-align: center;">
            <div id="kill-text" style="color: #ff0055; font-size: 15px; letter-spacing: 1px; font-weight: bold;">KILLS: 0 / 10</div>
            <div id="status-text" style="color: #00f0ff; font-size: 10px; font-weight: bold;">MODE: NORMAL</div>
        </div>
        <div class="ui-section">
            <span class="ui-label">OVERDRIVE SWORD</span>
            <div class="bar-container"><div id="super-bar"></div></div>
        </div>
    </div>

    <!-- Screen Canvas -->
    <canvas id="gameCanvas" width="800" height="360"></canvas>

    <!-- Controls Group -->
    <div id="controls">
        <div class="btn-group">
            <button class="btn" id="leftBtn">◀</button> 
            <button class="btn" id="rightBtn">▶</button>
        </div>
        <div class="btn-group">
            <button class="btn" id="teleportBtn">TP <span id="tp-cd" class="cooldown-overlay"></span></button>
            <button class="btn" id="dashBtn">DASH</button>
            <button class="btn" id="jumpBtn">▲</button>
            <button class="btn" id="attackBtn">⚔️</button>
        </div>
    </div>
<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const playerHpBar = document.getElementById("player-hp-bar");
    const superBar = document.getElementById("super-bar");
    const killText = document.getElementById("kill-text");
    const statusText = document.getElementById("status-text");
    const tpCdText = document.getElementById("tp-cd");
    const teleportBtn = document.getElementById("teleportBtn");

    // Game Config & Camera Map Scrolling
    const gravity = 0.55;
    const groundY = canvas.height - 40;
    const mapWidth = 2400; // خريطة متحركة طويلة جداً ولها نهاية
    
    let cameraX = 0;
    let kills = 0;
    let isSuperMode = false;
    let superTimer = 0;
    let particles = [];
    let swordDrops = [];
    
    // Player Setup Details
    let playerColor = "#00f0ff";
    let playerShadowColor = "#00f0ff";
    let swordLevel = 1; // يبدأ بسيف مستوى 1 ويقوى مع المساعدات

    // Timers
    let lastSwordDropTime = Date.now();
    let teleportCooldown = 0; // بالثواني (15 ثانية)
    let lastTeleportTime = 0;

    // --- PIXEL-ART BACKGROUND ENGINE (Sunset & Mountain) ---
    function drawPixelBackground() {
        ctx.save();
        // 1. Pixelated Sunset Gradient Sky
        let skyColors = ["#150526", "#360940", "#f72585", "#f77f00", "#fcbf49"];
        let step = canvas.height / skyColors.length;
        for (let i = 0; i < skyColors.length; i++) {
            ctx.fillStyle = skyColors[i];
            ctx.fillRect(0, i * step, canvas.width, step + 1);
        }

        // 2. Pixel Stars (Retro Cyber style)
        ctx.fillStyle = "#ffffff";
        for (let i = 0; i < 30; i++) {
            let starX = (Math.sin(i * 4523) * 0.5 + 0.5) * canvas.width;
            let starY = (Math.cos(i * 1243) * 0.5 + 0.5) * (canvas.height - 150);
            ctx.fillRect(Math.floor(starX), Math.floor(starY), 2, 2);
        }

        // 3. Cyber Pixel Sun
        let sunX = canvas.width / 2 - (cameraX * 0.1); // يتحرك ببطء شديد لإعطاء عمق
        let sunY = canvas.height - 120;
        ctx.fillStyle = "#ffb703";
        ctx.beginPath();
        ctx.arc(sunX, sunY, 35, 0, Math.PI, true);
        ctx.fill();
        // Sun Neon Scanlines
        ctx.fillStyle = "#f72585";
        for (let y = sunY - 35; y < sunY; y += 6) {
            ctx.fillRect(sunX - 40, y, 80, 2);
        }

        // 4. Parallax Low Poly / Pixel Mountains (الخلفية البعيدة)
        ctx.fillStyle = "#1e0b36";
        let mountainOffset = cameraX * 0.2; // بارالاكس خفيف
        ctx.beginPath();
        ctx.moveTo(0 - mountainOffset, groundY);
        // رسم جبل بسيط تقليدي خلفي
        for (let x = 0; x <= mapWidth; x += 120) {
            let height = 70 + Math.sin(x * 0.05) * 20;
            ctx.lineTo(x - mountainOffset, groundY - height);
        }
        ctx.lineTo(mapWidth, groundY);
        ctx.fill();

        // 5. Foreground Pixel Mountains (الجبال القريبة الداكنة)
        ctx.fillStyle = "#0c051c";
        let foreMountainOffset = cameraX * 0.4;
        ctx.beginPath();
        ctx.moveTo(0 - foreMountainOffset, groundY);
        for (let x = 0; x <= mapWidth; x += 80) {
            let height = 45 + Math.cos(x * 0.08) * 15;
            ctx.lineTo(x - foreMountainOffset, groundY - height);
        }
        ctx.lineTo(mapWidth, groundY);
        ctx.fill();

        ctx.restore();
    }

    // --- NEON & TELEPORT SPARK PARTICLES ---
    class Particle {
        constructor(x, y, color, type = "normal") {
            this.x = x;
            this.y = y;
            this.type = type; // normal, spark (lightning ⚡️), portal
            this.vx = (Math.random() - 0.5) * (type === "spark" ? 12 : 6);
            this.vy = (Math.random() - 0.5) * (type === "spark" ? 12 : 6);
            this.radius = Math.random() * 2 + 1.5;
            this.color = color;
            this.alpha = 1;
            this.length = Math.random() * 10 + 5; // للصواعق والشرارات
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.shadowBlur = 12;
            ctx.shadowColor = this.color;
            ctx.strokeStyle = this.color;
            ctx.fillStyle = this.color;

            if (this.type === "spark") {
                // تأثير شرارات البرق والكهرباء ⚡️
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(this.x - cameraX, this.y);
                ctx.lineTo(this.x - cameraX + this.vx, this.y + this.vy);
                ctx.stroke();
            } else {
                ctx.beginPath();
                ctx.arc(this.x - cameraX, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.alpha -= this.type === "spark" ? 0.06 : 0.035;
        }
    }

    // --- SWORD UPGRADES HELPERS (المساعدات كل 30 ثانية) ---
    class SwordDrop {
        constructor(x) {
            this.x = x;
            this.y = 0; // تسقط من السماء
            this.width = 20;
            this.height = 20;
            this.vy = 2;
            this.bounceTimer = 0;
            this.isGrounded = false;
        }
        draw() {
            let screenX = this.x - cameraX;
            this.bounceTimer += 0.1;
            let currentY = this.y + Math.sin(this.bounceTimer) * 4;

            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ffff00";
            
            // رسم سيف بكسل بلمعان أصفر كرمز للمساعدة
            ctx.fillStyle = "#ffff00";
            ctx.fillRect(screenX + 8, currentY, 4, 14); // نصل السيف
            ctx.fillStyle = "#ffaa00";
            ctx.fillRect(screenX + 4, currentY + 10, 12, 2); // مقبض السيف العرضي
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(screenX + 9, currentY + 12, 2, 4); // يد السيف
            
            ctx.restore();
        }
        update() {
            if (!this.isGrounded) {
                this.y += this.vy;
                if (this.y + this.height >= groundY) {
                    this.y = groundY - this.height;
                    this.isGrounded = true;
                }
            }
        }
    }
    // --- CYBORG FIGHTER CLASS (المقاتل المطور القوي) ---
    class Fighter {
        constructor(x, color, shadowColor, isPlayer) {
            this.x = x;
            this.y = groundY - 60;
            this.width = 30;
            this.height = 60;
            this.color = color;
            this.shadowColor = shadowColor;
            this.isPlayer = isPlayer;
            this.maxHealth = 100;
            this.health = 100;
            this.speed = isPlayer ? 5.5 : 2.5 + Math.random() * 1.5;
            this.vx = 0;
            this.vy = 0;
            this.isGrounded = false;
            this.isAttacking = false;
            this.attackCooldown = false;
            this.facing = isPlayer ? 1 : -1;
            this.isDead = false;
            this.respawnTimer = 0;
            this.history = [];
            
            // ميكانيكيات الانتقال الخارق (Teleport)
            this.isTeleporting = false;
            this.teleportStage = 0; // 1: الصعود، 2: الاختفاء، 3: الهبوط بالنهاية
            this.teleportTimer = 0;
        }

        draw() {
            if (this.isDead || (this.isTeleporting && this.teleportStage === 2)) return;

            let screenX = this.x - cameraX;
            ctx.save();
            
            if (this.isPlayer && isSuperMode) {
                this.color = "#ff00ff";
                this.shadowColor = "#ff00ff";
            } else if (this.isPlayer) {
                this.color = playerColor;
                this.shadowColor = playerShadowColor;
            }

            ctx.shadowBlur = 18;
            ctx.shadowColor = this.shadowColor;

            // 1. ذيل النيون للشخصيات القوية والريترو
            this.history.push({x: this.x, y: this.y});
            if (this.history.length > 6) this.history.shift();
            this.history.forEach((pos, i) => {
                ctx.globalAlpha = (i / this.history.length) * 0.25;
                ctx.fillStyle = this.color;
                ctx.fillRect(pos.x - cameraX, pos.y, this.width, this.height);
            });
            ctx.globalAlpha = 1.0;

            // 2. درع السايبورغ القوي المتطور
            ctx.fillStyle = "#0a0a14";
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 3;
            ctx.fillRect(screenX, this.y + 16, this.width, this.height - 16);
            ctx.strokeRect(screenX, this.y + 16, this.width, this.height - 16);

            ctx.fillStyle = this.color;
            ctx.fillRect(screenX + 8, this.y + 24, this.width - 16, 4);

            // 3. الرأس العائم الذكي مع عين ليزر ريترو
            ctx.beginPath();
            ctx.arc(screenX + this.width / 2, this.y + 8, 9, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(screenX + this.width / 2 + (4 * this.facing) - 1, this.y + 6, 3, 3);

            // 4. رسم حركة الأرجل البكسلية
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 3.5;
            let legOffset = Math.sin(Date.now() * 0.015) * 12;
            if (this.vx === 0 || !this.isGrounded) legOffset = 0;

            ctx.beginPath();
            ctx.moveTo(screenX + 8, this.y + this.height);
            ctx.lineTo(screenX + 5 + legOffset, this.y + this.height + 10);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(screenX + this.width - 8, this.y + this.height);
            ctx.lineTo(screenX + this.width - 5 - legOffset, this.y + this.height + 10);
            ctx.stroke();

            // 5. السيف المطور (يتأثر بالمساعدات والـ Overdrive)
            let baseLength = 40 + (swordLevel * 10);
            let currentLength = (this.isPlayer && isSuperMode) ? baseLength * 1.5 : baseLength;
            ctx.strokeStyle = this.isPlayer ? (isSuperMode ? "#ff00ff" : "#ffff00") : this.color;
            ctx.lineWidth = 4 + (swordLevel * 1.5);

            ctx.beginPath();
            let swordXStart = screenX + this.width / 2;
            let swordYStart = this.y + this.height / 2;

            if (this.isAttacking) {
                ctx.moveTo(swordXStart, swordYStart);
                ctx.lineTo(swordXStart + (currentLength * this.facing), swordYStart + 5);
            } else {
                ctx.moveTo(swordXStart, swordYStart);
                ctx.lineTo(swordXStart + (15 * this.facing), swordYStart - 25);
            }
            ctx.stroke();
            ctx.restore();
        }

        update() {
            if (this.isDead) {
                this.respawnTimer--;
                if (this.respawnTimer <= 0) this.respawn();
                return;
            }

            // نظام تتابع الانتقال الآلي الخارق (Teleport Skill)
            if (this.isPlayer && this.isTeleporting) {
                this.vx = 0;
                this.vy = 0;
                this.teleportTimer++;

                if (this.teleportStage === 1) {
                    // المرحلة 1: صعود سريع للسماء مع شرارات وصواعق ⚡️
                    this.y -= 18;
                    for (let i = 0; i < 4; i++) {
                        particles.push(new Particle(this.x + this.width/2, this.y + this.height/2, "#ffcc00", "spark"));
                    }
                    if (this.y < -80) {
                        this.teleportStage = 2;
                        this.teleportTimer = 0;
                    }
                } 
                else if (this.teleportStage === 2) {
                    // المرحلة 2: يختفي تماماً في ثقب وينتقل لنهاية الخريطة
                    if (this.teleportTimer > 20) {
                        this.x = mapWidth - 150;
                        this.y = -50;
                        this.teleportStage = 3;
                    }
                } 
                else if (this.teleportStage === 3) {
                    // المرحلة 3: الهبوط السريع من السماء في الموقع الجديد
                    this.y += 22;
                    for (let i = 0; i < 3; i++) {
                        particles.push(new Particle(this.x + this.width/2, this.y + this.height/2, "#ff00ff", "spark"));
                    }
                    if (this.y >= groundY - this.height) {
                        this.y = groundY - this.height;
                        this.isGrounded = true;
                        this.isTeleporting = false;
                        this.teleportStage = 0;
                        for (let i = 0; i < 25; i++) {
                            particles.push(new Particle(this.x + this.width/2, groundY, "#00f0ff", "normal"));
                        }
                    }
                }
                return;
            }

            this.vy += gravity;
            this.x += this.vx;
            this.y += this.vy;

            if (this.y + this.height >= groundY) {
                this.y = groundY - this.height;
                this.vy = 0;
                this.isGrounded = true;
            }

            if (this.x < 0) this.x = 0;
            if (this.x + this.width > mapWidth) this.x = mapWidth - this.width;
        }

        attack(targets) {
            if (this.attackCooldown || this.isDead || this.isTeleporting) return;
            this.isAttacking = true;
            this.attackCooldown = true;

            let baseLength = 40 + (swordLevel * 10);
            let currentLength = (this.isPlayer && isSuperMode) ? baseLength * 1.5 : baseLength;
            let swordRangeX = this.facing === 1 ? this.x + this.width : this.x - currentLength;
            
            let baseDamage = this.isPlayer ? 18 : 7;
            let damage = baseDamage + (swordLevel * 10);
            if (this.isPlayer && isSuperMode) damage = 120;

            targets.forEach(target => {
                if (target.isDead || target.isTeleporting) return;
                if (swordRangeX + currentLength > target.x && swordRangeX < target.x + target.width &&
                    this.y + this.height > target.y && this.y < target.y + target.height) {
                    
                    target.health -= damage;
                    for (let i = 0; i < 12; i++) {
                        particles.push(new Particle(target.x + target.width/2, target.y + target.height/2, this.isPlayer ? "#ffff00" : this.color, "normal"));
                    }
                    if (target.health <= 0) {
                        target.die();
                        if (this.isPlayer) { kills++; updateUI(); }
                    }
                }
            });

            setTimeout(() => { this.isAttacking = false; }, 120);
            setTimeout(() => { this.attackCooldown = false; }, 250);
        }

        die() {
            this.isDead = true;
            this.respawnTimer = 110; 
            for (let i = 0; i < 35; i++) {
                particles.push(new Particle(this.x + this.width/2, this.y + this.height/2, this.color, "normal"));
            }
        }

        respawn() {
            this.isDead = false;
            this.health = this.maxHealth;
            this.x = this.isPlayer ? cameraX + 100 : cameraX + Math.random() * (canvas.width - 200) + 100;
            this.y = groundY - this.height;
            this.vx = 0;
            this.vy = 0;
            this.history = [];
            if (this.isPlayer) updateUI();
        }
    }

    // --- INSTANTIATE ELEMENTS ---
    const player = new Fighter(150, playerColor, playerShadowColor, true);
    let enemies = [
        new Fighter(500, "#ff0055", "#ff0055", false),
        new Fighter(850, "#ffcc00", "#ffcc00", false),
        new Fighter(1300, "#ff00ff", "#ff00ff", false),
        new Fighter(1800, "#00ff66", "#00ff66", false)
    ];

    // --- SMART TRACKING ENEMY AI ---
    function updateEnemiesAI() {
        enemies.forEach(enemy => {
            if (enemy.isDead || player.isDead || player.isTeleporting) { enemy.vx = 0; return; }

            enemy.facing = (player.x > enemy.x) ? 1 : -1;
            let distance = Math.abs(player.x - enemy.x);

            if (distance < canvas.width) {
                if (distance > 50) {
enemy.vx = enemy.facing * enemy.speed;} else {enemy.vx = 0;enemy.attack([player]);}if (Math.random() < 0.015 && enemy.isGrounded) {enemy.vy = -10;enemy.isGrounded = false;}} else {enemy.vx = 0;}});}    // --- UI STATS SYSTEM (ENGLISH) ---
    function updateUI() {
        let hpPercent = Math.max(0, player.health);
        playerHpBar.style.width = `${hpPercent}%`;
        
        if (hpPercent > 50) playerHpBar.style.background = "#00ff66";
        else if (hpPercent > 25) playerHpBar.style.background = "#ffcc00";
        else playerHpBar.style.background = "#ff0055";

        if (!isSuperMode) {
            killText.innerText = `KILLS: ${kills} / 10`;
            let superPercent = Math.min(100, (kills / 10) * 100);
            superBar.style.width = `${superPercent}%`;

            if (kills >= 10) activateSuperMode();
        }
    }

    function activateSuperMode() {
        isSuperMode = true;
        superTimer = 450; 
        statusText.innerText = "MODE: OVERDRIVE SYSTEM CRITICAL!";
        statusText.style.color = "#ff00ff";
        superBar.style.background = "#ff00ff";
        superBar.style.width = "100%";
    }

    function deactivateSuperMode() {
        isSuperMode = false;
        kills = 0;
        statusText.innerText = "MODE: NORMAL";
        statusText.style.color = "#00f0ff";
        superBar.style.background = "#111";
        updateUI();
    }

    // --- TELEPORT COOLDOWN TIMER COUNTER (15s) & SWORD DROPS ---
    function updateTimers() {
        if (teleportCooldown > 0) {
            let elapsed = (Date.now() - lastTeleportTime) / 1000;
            let remaining = Math.ceil(15 - elapsed);
            if (remaining <= 0) {
                teleportCooldown = 0;
                teleportBtn.classList.remove("disabled");
                tpCdText.innerText = "";
            } else {
                tpCdText.innerText = `(${remaining}s)`;
            }
        }

        // إلقاء مساعدات السيف كل 30 ثانية تلقائياً أمام اللاعب
        if (Date.now() - lastSwordDropTime > 30000) {
            lastSwordDropTime = Date.now();
            let dropX = cameraX + Math.random() * (canvas.width - 200) + 100;
            swordDrops.push(new SwordDrop(dropX));
        }
    }

    // --- SMART CAMERA SCROLLING ---
    function updateCamera() {
        let targetCameraX = player.x - canvas.width / 2;
        cameraX += (targetCameraX - cameraX) * 0.1;

        if (cameraX < 0) cameraX = 0;
        if (cameraX > mapWidth - canvas.width) cameraX = mapWidth - canvas.width;
    }

    // --- TOUCH INTERFACE CONTROLS ---
    let keys = { left: false, right: false };

    function setupTouchButton(id, actionStart, actionEnd) {
        const btn = document.getElementById(id);
        btn.addEventListener("touchstart", (e) => { e.preventDefault(); actionStart(); });
        btn.addEventListener("touchend", (e) => { e.preventDefault(); if(actionEnd) actionEnd(); });
    }

    setupTouchButton("leftBtn", () => { keys.left = true; player.facing = -1; }, () => keys.left = false);
    setupTouchButton("rightBtn", () => { keys.right = true; player.facing = 1; }, () => keys.right = false);
    
    setupTouchButton("jumpBtn", () => { 
        if (player.isGrounded && !player.isDead && !player.isTeleporting) { 
            player.vy = -12; 
            player.isGrounded = false; 
        } 
    });
    
    setupTouchButton("attackBtn", () => { player.attack(enemies); });
    
    setupTouchButton("dashBtn", () => {
        if (!player.isDead && !player.isTeleporting) {
            player.x += player.facing * 65;
            for (let i = 0; i < 8; i++) {
                particles.push(new Particle(player.x, player.y + 25, player.color, "normal"));
            }
        }
    });

    // زر الانتقال الخارق (كل 15 ثانية للسماء ثم نهاية الخريطة)
    setupTouchButton("teleportBtn", () => {
        if (teleportCooldown === 0 && !player.isDead && !player.isTeleporting) {
            teleportCooldown = 15;
            lastTeleportTime = Date.now();
            teleportBtn.classList.add("disabled");
            
            player.isTeleporting = true;
            player.teleportStage = 1;
            player.teleportTimer = 0;

            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(player.x + player.width/2, player.y + player.height/2, "#ffcc00", "spark"));
            }
        }
    });

    function handlePlayerMovement() {
        if (player.isDead || player.isTeleporting) { player.vx = 0; return; }
        if (keys.left) player.vx = -player.speed;
        else if (keys.right) player.vx = player.speed;
        else player.vx = 0;
    }

    // --- MAIN RETRO ENGINE LOOP ---
    function gameLoop() {
        handlePlayerMovement();
        updateEnemiesAI();
        updateTimers();
        updateCamera();
        
        player.update();
        enemies.forEach(enemy => enemy.update());

        // التقاط المساعدات وتكبير السيف وزيادة قوته
        swordDrops.forEach((drop, index) => {
            drop.update();
            if (player.x + player.width > drop.x && player.x < drop.x + drop.width &&
                player.y + player.height > drop.y && player.y < drop.y + drop.height) {
                
                swordLevel++; 
                swordDrops.splice(index, 1);
                statusText.innerText = `SWORD UPGRADED TO LVL ${swordLevel}!`;
                statusText.style.color = "#ffff00";
                setTimeout(() => { if(!isSuperMode) statusText.style.color = "#00f0ff"; }, 2000);
                
                for(let i=0; i<15; i++) particles.push(new Particle(player.x+15, player.y+30, "#ffff00", "normal"));
            }
        });

        particles.forEach((p, index) => {
            p.update();
            if (p.alpha <= 0) particles.splice(index, 1);
        });

        if (isSuperMode) {
            superTimer--;
            superBar.style.width = `${(superTimer / 450) * 100}%`;
            if (superTimer <= 0) deactivateSuperMode();
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. رسم الخلفية البكسلية (الغروب والجبل)
        drawPixelBackground();

        // 2. رسم السيوف والمساعدات الساقطة
        swordDrops.forEach(drop => drop.draw());

        // 3. رسم أرضية البكسل السيبرانية المتحركة ولها نهاية
        ctx.fillStyle = "#090514";
        ctx.fillRect(0 - cameraX, groundY, mapWidth, canvas.height - groundY);
        ctx.strokeStyle = "#00f0ff";
        ctx.lineWidth = 3;
        ctx.beginPath(); 
        ctx.moveTo(0 - cameraX, groundY); 
        ctx.lineTo(mapWidth - cameraX, groundY); 
        ctx.stroke();

        // خط أحمر بكسلي يوضح حدود نهاية الخريطة تماماً
        ctx.strokeStyle = "#ff0055";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(mapWidth - cameraX - 5, groundY);
        ctx.lineTo(mapWidth - cameraX - 5, groundY + 40);
        ctx.stroke();

        // 4. رندرة وتحديث الأجسام والشخصيات والشرارات
        player.draw();
        enemies.forEach(enemy => enemy.draw());
        particles.forEach(p => p.draw());

        requestAnimationFrame(gameLoop);
    }

    // --- SCREEN NAVIGATION & SETUP COLOR SELECTION ---
    const colorBoxes = document.querySelectorAll(".color-box");
    colorBoxes.forEach(box => {
        box.addEventListener("click", () => {
            colorBoxes.forEach(b => b.classList.remove("selected"));
            box.classList.add("selected");
            playerColor = box.getAttribute("data-color");
            playerShadowColor = box.getAttribute("data-shadow");
        });
    });

    document.getElementById("playBtn").addEventListener("click", () => {
        document.getElementById("start-screen").style.display = "none";
        updateUI();
        gameLoop();
    });
</script>
</body>
</html>
